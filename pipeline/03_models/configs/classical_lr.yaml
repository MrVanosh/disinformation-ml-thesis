model_name: logistic_regression
family: classical
task: binary_classification
description: |
  Logistic Regression na TF-IDF (1-2grams, max 50k features, sublinear TF).
  Liniowy model z interpretowalnymi wagami — najprostszy baseline.
hyperparameters:
  vectorizer:
    type: tfidf
    ngram_range: [1, 2]
    max_features: 50000
    sublinear_tf: true
    min_df: 2
    max_df: 0.95
  classifier:
    C: 1.0
    penalty: l2
    solver: liblinear
    max_iter: 1000
    class_weight: balanced
seeds: [13, 42, 71, 89, 113]
preprocessing:
  lowercase: true
  remove_urls: true
  remove_mentions: true  # tylko dla TS
  remove_hashtag_symbol: false
metadata:
  paper_section: "2.x — Klasyczne baseline'y"
  citation: pedregosa2011
