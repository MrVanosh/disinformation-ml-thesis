model_name: distilbert-base-uncased
hf_repo: distilbert/distilbert-base-uncased
family: encoder
task: binary_classification
description: |
  DistilBERT — 6 warstw, 66M parametrów, ~97% jakości BERT-a na GLUE
  przy 60% szybszej inferencji (Sanh et al. 2019).
hyperparameters:
  max_length: 128  # tweety / krótkie statementy
  num_train_epochs: 3
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 64
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  optimizer: adamw_torch
  gradient_clipping: 1.0
  load_best_model_at_end: true
  metric_for_best: f1
  early_stopping_patience: 2
device:
  preferred: mps  # M4 Pro
  fallback: cpu
seeds: [13, 42, 71, 89, 113]
applies_to: [liar, truthseeker]
metadata:
  paper_section: "2.x — Encoder fine-tuning"
  citation: sanh2019distilbert
