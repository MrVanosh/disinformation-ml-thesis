family: llm_lora
variant: natural_distribution
task: binary_classification_via_prompt
description: |
  LoRA z naturalnym rozkładem klas treningowych (73/27 dla LIAR), zamiast
  zbalansowanego 50/50. Ablacja dla kontrybucji K2 (kalibracja decyzji).

base_config: lora_big.yaml  # dziedziczy poza data_config

models:
  - hf_repo: meta-llama/Llama-3.1-8B-Instruct
    short_name: llama31-8b
    mlx_repo: mlx-community/Meta-Llama-3.1-8B-Instruct-4bit
  - hf_repo: Qwen/Qwen2.5-7B-Instruct
    short_name: qwen25-7b
    mlx_repo: mlx-community/Qwen2.5-7B-Instruct-4bit

data_config:
  train_size: 2000
  val_size: 300
  class_balance: "natural"  # zachowuje rozkład testowy
  # dla LIAR: ~73% TRUE / ~27% FALSE
  augmentation: none

# Przepis dziedziczony z lora_big (runner nie obsługuje base_config — wpisane wprost):
lora_config:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  num_layers: 32
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  num_iters: 1500
  batch_size: 1
  grad_accum: 8
  max_seq_length: 768
  learning_rate: 5.0e-5
  warmup_steps: 100
  weight_decay: 0.01
  gradient_clipping: 1.0
  save_every: 250

prompt_template_id: short_binary

# Tylko na LIAR (jedyny zbiór z silnie niezbalansowanym rozkładem)
seeds: [13, 42, 71, 89, 113]
applies_to: [liar]
metadata:
  paper_section: "2.x — LoRA natural distribution (kontrybucja K2)"
  citations: [hu2022]
