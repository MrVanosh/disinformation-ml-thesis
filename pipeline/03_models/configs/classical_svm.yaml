model_name: linear_svm
family: classical
task: binary_classification
description: |
  Liniowa SVM na TF-IDF. Historycznie najsilniejszy klasyczny baseline
  dla klasyfikacji tekstu (Joachims 1998, Pang & Lee 2002).
hyperparameters:
  vectorizer:
    type: tfidf
    ngram_range: [1, 2]
    max_features: 50000
    sublinear_tf: true
    min_df: 2
    max_df: 0.95
  classifier:
    C: 1.0
    loss: squared_hinge
    penalty: l2
    max_iter: 5000
    class_weight: balanced
    dual: auto
seeds: [13, 42, 71, 89, 113]
preprocessing:
  lowercase: true
  remove_urls: true
  remove_mentions: true
metadata:
  paper_section: "2.x — Klasyczne baseline'y"
  citation: vapnik1995
